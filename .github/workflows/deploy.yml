name: Build and Remote Deploy
on:
  push:
    branches: [main, dev]
  workflow_dispatch:

jobs:
  build-test-push:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - service: frontend
            context: ./deployment/frontend
            test_command: 'echo "FE"'
          - service: backend
            context: ./deployment/backend
            test_command: 'echo "BE"'
          - service: worker
            context: ./deployment/worker
            test_command: 'echo "DB"'

    steps:
      - name: Secret Check
        run: |
          echo "Testing OAUTH_CLIENT_ID length..."
          if [ -z "${{ secrets.OAUTH_CLIENT_ID }}" ]; then
            echo "RESULT: Secret is TRULY empty"
            exit 1
          else
            echo "RESULT: Secret is found (length is NOT zero)"
          fi

      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Connect to Tailscale
        uses: tailscale/github-action@v2
        with:
          oauth-client-id: ${{ secrets.OAUTH_CLIENT_ID }}
          oauth-secret: ${{ secrets.OAUTH_SECRED }}
          tags: tag:ci

      - name: Build Image
        run: |
          docker build -t ${{ secrets.SERVER_IP }}:5000/${{ matrix.service }}:${{ github.sha }} ${{ matrix.context }}

      - name: Run Service-Specific Tests
        run: |
          docker run --rm ${{ secrets.SERVER_IP }}:5000/${{ matrix.service }}:${{ github.sha }} ${{ matrix.test_command }}

      - name: Push to Arch Server Registry
        run: |
          docker push ${{ secrets.SERVER_IP }}:5000/${{ matrix.service }}:${{ github.sha }}

  deploy:
    needs: build-test-push
    runs-on: ubuntu-latest
    steps:
      - name: Connect to Tailscale
        uses: tailscale/github-action@v2
        with:
          oauth-client-id: ${{ secrets.OAUTH_CLIENT_ID }}
          oauth-secret: ${{ secrets.OAUTH_SECRED }}
          tags: tag:ci

      - name: Set K8s Context
        uses: azure/k8s-set-context@v3
        with:
          method: kubeconfig
          kubeconfig: ${{ secrets.KUBECONFIG }}

      - name: Update K8s Images
        run: |
          kubectl set image deployment/frontend frontend=${{ secrets.SERVER_IP }}:5000/frontend:${{ github.sha }}
          kubectl set image deployment/backend backend=${{ secrets.SERVER_IP }}:5000/backend:${{ github.sha }}
          kubectl set image deployment/worker worker=${{ secrets.SERVER_IP }}:5000/worker:${{ github.sha }}
