name: Build and Remote Deploy
on:
  push:
    branches: [main, dev]
  workflow_dispatch:

jobs:
  build-test-push:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - service: backend
            context: .
          - service: worker
            context: .

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Connect to Tailscale
        uses: tailscale/github-action@v2
        with:
          oauth-client-id: ${{ secrets.OAUTH_CLIENT_ID }}
          oauth-secret: ${{ secrets.OAUTH_SECRET }}
          tags: tag:ci

      - name: Build Image
        run: |
          docker build -t ${{ secrets.SERVER_IP }}:5000/${{ matrix.service }}:${{ github.sha }} ${{ matrix.context }}

      - name: Run DB Integration Tests
        if: matrix.service == 'worker'
        working-directory: deployment/DBImage
        run: |
          docker compose up -d

          echo "Waiting for eco-city-mongo to be healthy..."
          for i in $(seq 1 12); do
            STATUS=$(docker inspect --format='{{.State.Health.Status}}' eco-city-mongo 2>/dev/null || echo "missing")
            echo "  attempt $i: $STATUS"
            [ "$STATUS" = "healthy" ] && break
            [ $i -eq 12 ] && echo "Container never became healthy" && docker compose logs && exit 1
            sleep 5
          done

          docker exec eco-city-mongo sh -c \
            "mongorestore --drop --db Eco_city_game /backup/Eco_city_game"

          docker exec eco-city-mongo mongosh --quiet Eco_city_game --eval "
            const collections = ['games', 'resources', 'current_petition', 'active_petitions', 'petition_counts'];
            let failed = false;

            const existing = db.getCollectionNames();
            print('Found collections: ' + JSON.stringify(existing));

            for (const col of collections) {
              if (!existing.includes(col)) {
                print('FAIL: missing collection: ' + col);
                failed = true;
                continue;
              }
              const count = db[col].countDocuments();
              print(col + ': ' + count + ' document(s)');
              if (count === 0) { print('WARN: ' + col + ' is empty'); }
            }

            print('');
            print('=== games ===');            printjson(db.games.find().toArray());
            print('=== resources ===');        printjson(db.resources.find().toArray());
            print('=== current_petition ==='); printjson(db.current_petition.find().toArray());
            print('=== active_petitions ==='); printjson(db.active_petitions.find().toArray());
            print('=== petition_counts ===');  printjson(db.petition_counts.find().toArray());

            if (failed) { print('One or more collections missing — failing.'); quit(1); }
            print('All collections present.');
          "

      - name: Tear Down DB Stack
        if: matrix.service == 'worker' && always()
        working-directory: deployment/DBImage
        run: docker compose down -v

      - name: Push to Arch Server Registry
        run: |
          docker push ${{ secrets.SERVER_IP }}:5000/${{ matrix.service }}:${{ github.sha }}

  deploy:
    needs: build-test-push
    runs-on: ubuntu-latest
    steps:
      - name: Connect to Tailscale
        uses: tailscale/github-action@v2
        with:
          oauth-client-id: ${{ secrets.OAUTH_CLIENT_ID }}
          oauth-secret: ${{ secrets.OAUTH_SECRET }}
          tags: tag:ci

      - name: Set K8s Context
        uses: azure/k8s-set-context@v3
        with:
          method: kubeconfig
          kubeconfig: ${{ secrets.KUBECONFIG }}

      - name: Update K8s Images
        run: |
          kubectl set image deployment/backend backend=${{ secrets.SERVER_IP }}:5000/backend:${{ github.sha }}
          kubectl set image deployment/worker  worker=${{ secrets.SERVER_IP }}:5000/worker:${{ github.sha }}
